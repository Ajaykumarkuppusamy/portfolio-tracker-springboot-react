# # MySQL Datasource - These will be set as Environment Variables in the hosting service
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# # JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# # Flyway Database Migration
spring.flyway.enabled=true

# # Custom App Configuration - These will also be set as Environment Variables
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# # Alpha Vantage API Configuration
alpha.vantage.api.url=https://www.alphavantage.co/query
alpha.vantage.api.key=${ALPHA_VANTAGE_API_KEY}

